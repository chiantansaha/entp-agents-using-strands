version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8083:8083"
    environment:
      - PORT=8083
      - BACKEND_URL=http://backend:9083
      - HEALTHCHECK=/health
      - TEAM_NAME=aws-ai-team
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-ap-southeast-2}
    depends_on:
      - backend
    networks:
      - aws-ai-team-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "9083:9083"
    environment:
      - PORT=9083
      - TEAM_NAME=aws-ai-team
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-ap-southeast-2}
    networks:
      - aws-ai-team-network

networks:
  aws-ai-team-network:
    driver: bridge
